<!DOCTYPE html>
<html>
<head>
    <title>CodeMitra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            overflow-x: hidden;
            position: relative;
            background: #0a0e27;
            color: white;
        }
        
        body.dark {
            color: white;
        }
        
        /* LIVE WALL CANVAS BACKGROUND */
        #liveWallCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            display: block;
        }
        
        /* Content overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.3);
            z-index: -1;
            pointer-events: none;
        }
        
        /* Light mode adjustments */
        body.light {
            color: #333;
        }
        
        body.light::before {
            background: rgba(244, 244, 244, 0.15);
        }
        
        /* Dark mode */
        body.dark {
            background: #0a0e27;
            color: white;
        }
        
        body.dark::before {
            background: rgba(10, 14, 39, 0.4);
        }
        
        /* HEADER (UNCHANGED AS REQUESTED) */
        .main-header {
            background: #1976d2;
            color: white;
            text-align: center;
            padding: 30px 10px;
            position: relative;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        
        .main-header h1 {
            margin: 0;
            font-size: 36px;
            font-weight: bold;
        }
        
        .main-header p {
            margin-top: 8px;
            font-size: 18px;
        }
        
        .navbar {
            background: #222;
            text-align: center;
            padding: 12px;
            position: relative;
            z-index: 10;
        }
        
        .navbar a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
        }
        
        .navbar a:hover {
            text-decoration: underline;
            color: #7dd3fc;
        }
        
        /* SEARCH */
        .search {
            padding: 20px;
            text-align: center;
            position: relative;
            z-index: 5;
        }
        
        input {
            width: 80%;
            max-width: 500px;
            padding: 12px 16px;
            border-radius: 25px;
            border: 2px solid rgba(255,255,255,0.2);
            font-size: 16px;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: all 0.3s;
            color: #333;
        }
        
        body.dark input {
            background: rgba(30,30,30,0.95);
            color: white;
            border: 2px solid rgba(255,255,255,0.1);
        }
        
        input:focus {
            outline: none;
            box-shadow: 0 8px 40px rgba(25, 118, 210, 0.5);
            border: 2px solid #1976d2;
            transform: translateY(-2px);
        }
        
        input::placeholder {
            color: #999;
        }
        
        body.dark input::placeholder {
            color: #666;
        }
        
        /* CARDS */
        .container {
            padding: 30px 20px;
            position: relative;
            z-index: 5;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            margin: 15px auto;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            max-width: 600px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .card:hover::before {
            left: 100%;
        }
        
        body.dark .card {
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(255,255,255,0.15);
        }
        
        .card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 20px 50px rgba(25, 118, 210, 0.3);
        }
        
        .card h3 {
            margin: 0 0 10px 0;
            font-size: 22px;
            color: #1976d2;
            font-weight: bold;
        }
        
        body.dark .card h3 {
            color: #7dd3fc;
        }
        
        .card p {
            margin: 0;
            color: #666;
            font-size: 15px;
        }
        
        body.dark .card p {
            color: #aaa;
        }
        
        /* BUTTON */
        button {
            padding: 11px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            transition: all 0.3s;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
        }
        
        button:hover {
            transform: scale(1.1) translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 123, 255, 0.6);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 100;
            display: none;
        }
        
        /* QUIZ STYLES */
        .quiz-container {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
            z-index: 5;
        }
        
        .quiz-question {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            margin: 20px auto;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        body.dark .quiz-question {
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(255,255,255,0.15);
        }
        
        .quiz-question h3 {
            margin: 0 0 20px 0;
            font-size: 20px;
            color: #1976d2;
            font-weight: bold;
        }
        
        body.dark .quiz-question h3 {
            color: #7dd3fc;
        }
        
        .option-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            text-align: left;
            font-weight: 500;
        }
        
        body.dark .option-btn {
            background: #1e1e1e;
            border: 2px solid #444;
            color: white;
        }
        
        .option-btn:hover {
            border-color: #1976d2;
            background: #f0f7ff;
            transform: translateX(5px);
        }
        
        body.dark .option-btn:hover {
            background: #2a2a2a;
            border-color: #7dd3fc;
        }
        
        .option-btn.selected {
            border-color: #1976d2;
            background: #e3f2fd;
        }
        
        body.dark .option-btn.selected {
            background: #1a3a52;
            border-color: #7dd3fc;
        }
        
        .result-bar {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #f5f5f5;
            display: none;
        }
        
        body.dark .result-bar {
            background: #2a2a2a;
        }
        
        .result-bar.show {
            display: block;
        }
        
        .result-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        
        body.dark .result-label {
            color: #fff;
        }
        
        .result-percentage {
            color: #1976d2;
            font-size: 18px;
        }
        
        .progress-bar {
            width: 100%;
            height: 25px;
            background: #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        body.dark .progress-bar {
            background: #444;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1976d2, #0056b3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
            transition: width 0.4s ease;
        }
        
        .votes-count {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        
        body.dark .votes-count {
            color: #999;
        }
        
        .correct-answer-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.2), rgba(56, 142, 60, 0.2));
            border: 2px solid #4caf50;
            display: none;
        }
        
        .correct-answer-box.show {
            display: block;
        }
        
        .correct-answer-title {
            font-weight: bold;
            color: #4caf50;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .correct-answer-text {
            color: #81c784;
            font-size: 16px;
            font-weight: 600;
        }
        
        .wrong-answer-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(244, 67, 54, 0.2), rgba(211, 47, 47, 0.2));
            border: 2px solid #f44336;
            display: none;
        }
        
        .wrong-answer-box.show {
            display: block;
        }
        
        .wrong-answer-title {
            font-weight: bold;
            color: #f44336;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .wrong-answer-text {
            color: #ef5350;
            font-size: 16px;
            font-weight: 600;
        }
        
        .answer-feedback {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        
        .answer-feedback.show {
            display: block;
        }
        
        .feedback-correct {
            background: rgba(76, 175, 80, 0.2);
            color: #81c784;
            border: 2px solid #4caf50;
        }
        
        .feedback-wrong {
            background: rgba(244, 67, 54, 0.2);
            color: #ef5350;
            border: 2px solid #f44336;
        }
        
        footer {
            background: rgba(51, 51, 51, 0.95);
            color: white;
            text-align: center;
            padding: 20px;
            position: relative;
            z-index: 10;
            margin-top: 40px;
            backdrop-filter: blur(10px);
        }

<canvas id="liveWallCanvas"></canvas>

<!--Title-->
    <h2 align="center">DAILY 5 NEW MCQS</h2>
<!-- CONTENT -->
<div class="container">
    <div class="quiz-container">
        <div id="quizContent"></div>
    </div>
</div>

<footer>
    <p>© <span id="year"></span> CodeMitra</p>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

<script>
    // LIVE WALL PARTICLE SYSTEM
    const canvas = document.getElementById('liveWallCanvas');
    const ctx = canvas.getContext('2d');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    const particles = [];
    const connections = [];
    const particleCount = 50;
    
    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 2;
            this.vy = (Math.random() - 0.5) * 2;
            this.size = Math.random() * 3 + 1;
            this.brightness = Math.random() * 100 + 50;
        }
        
        update() {
            this.x += this.vx;
            this.y += this.vy;
            
            // Bounce off walls
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            
            // Keep in bounds
            this.x = Math.max(0, Math.min(canvas.width, this.x));
            this.y = Math.max(0, Math.min(canvas.height, this.y));
            
            // Pulsing effect
            this.brightness += (Math.random() - 0.5) * 2;
            this.brightness = Math.max(30, Math.min(100, this.brightness));
        }
        
        draw() {
            ctx.fillStyle = `hsla(200, 100%, ${this.brightness}%, 0.8)`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            
            // Glow effect
            ctx.strokeStyle = `hsla(200, 100%, ${this.brightness}%, 0.3)`;
            ctx.lineWidth = 1;
            ctx.stroke();
        }
    }
    
    // Initialize particles
    for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
    }
    
    // Mouse position tracking
    let mouseX = canvas.width / 2;
    let mouseY = canvas.height / 2;
    
    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });
    
    function drawConnections() {
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 150) {
                    ctx.strokeStyle = `hsla(200, 100%, 60%, ${(1 - distance / 150) * 0.3})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.stroke();
                }
            }
        }
    }
    
    function drawMouseEffect() {
        const mouseRadius = 150;
        
        for (let i = 0; i < particles.length; i++) {
            const dx = mouseX - particles[i].x;
            const dy = mouseY - particles[i].y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance < mouseRadius) {
                const angle = Math.atan2(dy, dx);
                const force = (1 - distance / mouseRadius) * 3;
                particles[i].vx -= Math.cos(angle) * force;
                particles[i].vy -= Math.sin(angle) * force;
            }
        }
    }
    
    function animate() {
        // Clear canvas with fade effect
        ctx.fillStyle = 'rgba(10, 14, 39, 0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Update and draw particles
        particles.forEach(particle => {
            particle.update();
            particle.draw();
        });
        
        // Draw connections
        drawConnections();
        
        // Mouse repulsion effect
        drawMouseEffect();
        
        requestAnimationFrame(animate);
    }
    
    animate();
    
    // Resize handler
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
    
    // ORIGINAL FUNCTIONS
    function searchPosts() {
        let input = document.getElementById("search").value.toLowerCase();
        let cards = document.getElementsByClassName("card");
        for (let i = 0; i < cards.length; i++) {
            let text = cards[i].innerText.toLowerCase();
            cards[i].style.display = text.includes(input) ? "block" : "none";
        }
    }
    
    function toggleDarkMode() {
        document.body.classList.toggle("dark");
    }
    
    // QUIZ SYSTEM
    const quizData = [
        {
            id: 1,
            question: "1. What is the correct syntax to declare a variable in C?",
            options: ["A)  var x = 10", "B)  int x = 10", "C)  x := 10", "D)  declare x = 10"],
            correctAnswer: "B)  int x = 10"
        },
        {
            id: 2,
            question: "Which data type is used to store text in Python?",
            options: ["A)  int", "B)  float", "C)  str", "D)  char"],
            correctAnswer: "C)  Str"
        },
        {
            id: 3,
            question: "Which HTML tag is used to create a hyperlink?",
          options: ["A)  <link>", "B)  <a>", "C)  <href>", "D)  <url>"],
            correctAnswer: "B)  <a>"
        },
        {
            id: 4,
            question: "Which symbol is used for comments in C?",
            options: ["A)  //", "B)  #", "C)  <!-- -->", "D)  **"],
            correctAnswer: "A)  //"
        },
        {
            id: 5,
            question: "Which of the following is a JavaScript data type?",
            options: ["A)  number", "B)  string", "C)  boolean", "D)  All of the above"],
            correctAnswer: "D)  All of the above"
        }
    ];
    
    const quizVotes = {};
    
    // Initialize votes
    quizData.forEach(quiz => {
        quizVotes[quiz.id] = {};
        quiz.options.forEach(option => {
            quizVotes[quiz.id][option] = 0;
        });
    });
    
    function renderQuiz() {
        const quizContent = document.getElementById('quizContent');
        quizContent.innerHTML = '';
        
        quizData.forEach(quiz => {
            const quizDiv = document.createElement('div');
            quizDiv.className = 'quiz-question';
            quizDiv.innerHTML = `<h3>${quiz.question}</h3>`;
            
            quiz.options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => selectOption(quiz.id, option, btn.parentElement);
                quizDiv.appendChild(btn);
            });
            
            // Result bar
            const resultDiv = document.createElement('div');
            resultDiv.className = 'result-bar';
            resultDiv.id = `result-${quiz.id}`;
            
            quiz.options.forEach(option => {
                const barDiv = document.createElement('div');
                barDiv.className = 'option-result';
                barDiv.id = `bar-${quiz.id}-${option.replace(/\s+/g, '_')}`;
                barDiv.innerHTML = `
                    <div class="result-label">
                        <span>${option}</span>
                        <span class="result-percentage" id="percent-${quiz.id}-${option.replace(/\s+/g, '_')}">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="fill-${quiz.id}-${option.replace(/\s+/g, '_')}" style="width: 0%;">
                            0%
                        </div>
                    </div>
                    <div class="votes-count" id="votes-${quiz.id}-${option.replace(/\s+/g, '_')}">0 votes</div>
                `;
                resultDiv.appendChild(barDiv);
            });
            
            // Feedback Message
            const feedbackDiv = document.createElement('div');
            feedbackDiv.className = 'answer-feedback';
            feedbackDiv.id = `feedback-${quiz.id}`;
            resultDiv.appendChild(feedbackDiv);
            
            // Wrong Answer Box
            const wrongAnswerDiv = document.createElement('div');
            wrongAnswerDiv.className = 'wrong-answer-box';
            wrongAnswerDiv.id = `wrong-${quiz.id}`;
            wrongAnswerDiv.innerHTML = `
                <div class="wrong-answer-title">✗ Your Answer</div>
                <div class="wrong-answer-text" id="wrong-text-${quiz.id}"></div>
            `;
            resultDiv.appendChild(wrongAnswerDiv);
            
            // Correct Answer Box
            const correctAnswerDiv = document.createElement('div');
            correctAnswerDiv.className = 'correct-answer-box';
            correctAnswerDiv.id = `answer-${quiz.id}`;
            correctAnswerDiv.innerHTML = `
                <div class="correct-answer-title">✓ Correct Answer</div>
                <div class="correct-answer-text">${quiz.correctAnswer}</div>
            `;
            resultDiv.appendChild(correctAnswerDiv);
            
            quizDiv.appendChild(resultDiv);
            quizContent.appendChild(quizDiv);
        });
    }
    
    function selectOption(quizId, option, parentElement) {
        // Mark button as selected
        const buttons = parentElement.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.classList.remove('selected'));
        event.target.classList.add('selected');
        
        // Add vote
        quizVotes[quizId][option]++;
        
        // Show results
        displayResults(quizId, option);
    }
    
    function displayResults(quizId, selectedOption) {
        const resultBar = document.getElementById(`result-${quizId}`);
        resultBar.classList.add('show');
        
        const quiz = quizData.find(q => q.id === quizId);
        const totalVotes = Object.values(quizVotes[quizId]).reduce((a, b) => a + b, 0);
        
        quiz.options.forEach(option => {
            const votes = quizVotes[quizId][option];
            const percentage = totalVotes === 0 ? 0 : Math.round((votes / totalVotes) * 100);
            const safeOption = option.replace(/\s+/g, '_');
            
            document.getElementById(`percent-${quizId}-${safeOption}`).textContent = `${percentage}%`;
            document.getElementById(`fill-${quizId}-${safeOption}`).style.width = `${percentage}%`;
            document.getElementById(`fill-${quizId}-${safeOption}`).textContent = `${percentage}%`;
            document.getElementById(`votes-${quizId}-${safeOption}`).textContent = `${votes} vote${votes !== 1 ? 's' : ''}`;
        });
        
        // Check if answer is correct or wrong
        const isCorrect = selectedOption === quiz.correctAnswer;
        const feedbackDiv = document.getElementById(`feedback-${quizId}`);
        const wrongAnswerBox = document.getElementById(`wrong-${quizId}`);
        const correctAnswerBox = document.getElementById(`answer-${quizId}`);
        
        if (isCorrect) {
            // Correct Answer
            feedbackDiv.classList.add('show', 'feedback-correct');
            feedbackDiv.textContent = '🎉 Correct! Well Done!';
            wrongAnswerBox.classList.remove('show');
            correctAnswerBox.classList.add('show');
        } else {
            // Wrong Answer
            feedbackDiv.classList.add('show', 'feedback-wrong');
            feedbackDiv.textContent = '❌ Incorrect! Try Again!';
            wrongAnswerBox.classList.add('show');
            document.getElementById(`wrong-text-${quizId}`).textContent = selectedOption;
            correctAnswerBox.classList.add('show');
        }
    }
    
    // Render quiz on page load
    document.addEventListener('DOMContentLoaded', function() {
        document.body.classList.add('dark');
        renderQuiz();
    });
</script>
