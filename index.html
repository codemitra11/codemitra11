<!DOCTYPE html>
<html>
<head>
    <title>CodeMitra - Final</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { font-family: Arial; margin: 0; background: #f4f4f4; transition: 0.3s; }
        body.dark { background: #121212; color: white; }

        /* HEADER (UNCHANGED AS REQUESTED) */
        .main-header {
            background: #1976d2;
            color: white;
            text-align: center;
            padding: 30px 10px;
        }

        .main-header h1 {
            margin: 0;
            font-size: 36px;
        }

        .main-header p {
            margin-top: 8px;
            font-size: 18px;
        }

        .navbar {
            background: #222;
            text-align: center;
            padding: 12px;
        }

        .navbar a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-size: 16px;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        /* SEARCH */
        .search { padding: 15px; text-align: center; }
        input { width: 80%; padding: 10px; border-radius: 8px; border: none; }

        /* CARDS */
        .container { padding: 20px; }

        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        body.dark .card { background: #1e1e1e; }

        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        /* BUTTON */
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background: #007bff;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background: #0056b3;
            transform: scale(1.1);
        }

        .toggle {
            position: fixed;
            top: 10px;
            right: 10px;
        }

        footer { background: #333; color: white; text-align: center; padding: 10px; }
    </style>

    <script>
        function searchPosts() {
            let input = document.getElementById("search").value.toLowerCase();
            let cards = document.getElementsByClassName("card");
            for (let i = 0; i < cards.length; i++) {
                let text = cards[i].innerText.toLowerCase();
                cards[i].style.display = text.includes(input) ? "block" : "none";
            }
        }

        function toggleDarkMode() {
            document.body.classList.toggle("dark");
        }
    </script>
</head>
<body>

<button class="toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>

<!-- HEADER -->
<header class="main-header">
    <h1>CodeMitra</h1>
    <p>Learn Coding Easily</p>
</header>

<nav class="navbar">
    <a href="#">Home</a>
    <a href="#">C Programs</a>
    <a href="#">Python</a>
    <a href="#">Contact</a>
</nav>

<!-- SEARCH -->
<div class="search">
    <input type="text" id="search" onkeyup="searchPosts()" placeholder="Search programs...">
</div>

<!-- CONTENT -->
<div class="container">

<div class="card">
<h3>Palindrome Program in C</h3>
<p>Click to view code</p>
</div>

<div class="card">
<h3>Fibonacci Series</h3>
<p>Click to view code</p>
</div>

<div class="card">
<h3>GCD Program</h3>
<p>Click to view code</p>
</div>

</div>

<footer>
    <p>© 2026 CodeMitra</p>
</footer>

</body>
</html>
